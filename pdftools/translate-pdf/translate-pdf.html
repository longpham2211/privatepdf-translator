  <style>html,body{background-color:#f8fafc;margin:0;padding:0;}html.dark-mode,html.dark-mode body{background-color:#0a0a0a!important;}</style>
  <meta charset="UTF-8" />

  <script>
    // Critical Script: Anti-FOUC (Dark Mode + Language + White Flash)
    (function () {
      // 1. Handle Dark Mode Immediately
      const isDark = localStorage.getItem('darkMode') === 'enabled';
      if (isDark) {
        document.documentElement.classList.add('dark-mode');
        document.write('<style>html,body{background-color:#0a0a0a!important;color:#f8f9fa!important;}</style>');
      } else {
        document.write('<style>html,body{background-color:#f8fafc!important;}</style>');
      }

      // 2. Hide immediately to prevent language FOUC
      document.documentElement.style.opacity = '0';

      // 3. Reveal after i18n applies (or fallback after 800ms)
      window.__revealPage = function() {
        document.documentElement.style.transition = 'opacity 0.12s ease';
        document.documentElement.style.opacity = '1';
      };
      window.__revealPageTimer = setTimeout(window.__revealPage, 800);
    })();
  </script>

  <script>

      const savedLang = localStorage.getItem('selectedLanguage');
      if (savedLang === 'en' || savedLang === 'vi') {
        document.documentElement.lang = savedLang;
      } else {
        document.documentElement.lang = 'vi'; // Mặc định
      }
      // Remove loading class để hiển thị nội dung
      document.documentElement.classList.remove('lang-loading');
    })();
  </script>

  <!-- Anti-FOUC: Intercept i18n CustomEvent BEFORE i18n.js runs -->
  <script>
    (function () {
      var _orig = window.dispatchEvent.bind(window);
      window.dispatchEvent = function (event) {
        var result = _orig(event);
        if (event instanceof CustomEvent && typeof window.__revealPage === 'function') {
          clearTimeout(window.__revealPageTimer);
          window.__revealPage();
          window.__revealPage = null;
          window.dispatchEvent = _orig;
        }
        return result;
      };
    })();
  </script>
