name: Build Electron App

on:
  release:
    types: [created]
  workflow_dispatch:

permissions:
  contents: write
jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    
    runs-on: ${{ matrix.os }}

    steps:
      - name: Lấy source code của Frontend (Electron)
        uses: actions/checkout@v4

      - name: Cài đặt Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cài đặt thư viện (Dependencies)
        run: npm install

      - name: Download Backend Artifact từ Private Repo
        uses: dawidd6/action-download-artifact@v3
        with:
          github_token: ${{ secrets.PAT_TOKEN }}
          
          repo: longpham2211/privatepdf-backend
          
          workflow: build.yml
          
          workflow_conclusion: success
          
          name: backend-${{ matrix.os }}
          
          path: backend/

      - name: Build ứng dụng (Electron Builder)
        
        run: npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifacts (Tải file cài đặt lên GitHub)
        uses: actions/upload-artifact@v4
        with:
          name: privatepdf-app-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
            dist/*.snap
            dist/*.deb
