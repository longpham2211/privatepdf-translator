<!-- Auth Modal Overlay -->
<div class="auth-modal-overlay" id="authModal">
  <div class="auth-modal">
    <div class="auth-modal-header">
      <h2 data-i18n-key="auth.modalTitle">Đăng nhập / Đăng ký</h2>
      <p class="auth-subtitle" data-i18n-key="auth.modalSubtitle">Chào mừng bạn đến với Privatepdf</p>
      <button class="auth-modal-close" id="authModalClose" aria-label="Close">&times;</button>
    </div>
    
    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="login" data-i18n-key="auth.signInTitle">Đăng nhập</button>
      <button class="auth-tab" data-tab="register" data-i18n-key="auth.signUpTitle">Đăng ký</button>
    </div>
    
    <div class="auth-modal-body">
      <!-- Login Tab -->
      <div class="auth-tab-content active" id="login-tab">
        <div class="social-login">
          <button class="social-btn" id="googleLoginBtn">
            <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            <span class="social-text" data-i18n-key="auth.signInGoogle">Đăng nhập với Google</span>
          </button>
        </div>
        
          <div class="divider"><span data-i18n-key="common.or">hoặc</span></div>
        
        <form class="auth-form" id="loginForm">
          <div class="form-group">
            <label for="loginEmail" data-i18n-key="auth.email">Email</label>
            <input type="email" id="loginEmail" placeholder="name@company.com" required>
            <span class="input-error-message" id="loginEmailError"></span>
          </div>
          
          <div class="form-group">
            <label for="loginPassword" data-i18n-key="auth.password">Mật khẩu</label>
            <div class="password-input-wrapper">
              <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password" required>
              <button type="button" class="password-toggle-btn" data-target="loginPassword" aria-label="Toggle password visibility">
                <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                <svg class="eye-off-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
              </button>
            </div>
              <span class="input-error-message" id="loginPasswordError"></span>
          </div>
          
          <div class="form-actions">
            <label class="remember-me">
              <input type="checkbox" id="rememberMe">
              <span data-i18n-key="auth.rememberMe">Ghi nhớ</span>
            </label>
            <a href="#" class="forgot-password" data-i18n-key="auth.forgotPassword">Quên mật khẩu?</a>
          </div>
          
          <button type="submit" class="submit-btn" data-i18n-key="auth.signInBtn">Đăng nhập</button>
        </form>
      </div>
      
      <!-- Register Tab -->
      <div class="auth-tab-content" id="register-tab">
        <div class="social-login">
          <button class="social-btn" id="googleRegisterBtn">
            <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            <span class="social-text" data-i18n-key="auth.signUpGoogle">Đăng ký với Google</span>
          </button>
        </div>
        
        <div class="divider"><span data-i18n-key="common.or">hoặc</span></div>
        
        <form class="auth-form" id="registerForm">
          <div class="form-group">
            <label for="registerName" data-i18n-key="auth.fullName">Họ và tên</label>
            <input type="text" id="registerName" placeholder="John Doe" required>
          </div>
          
          <div class="form-group">
            <label for="registerEmail" data-i18n-key="auth.email">Email</label>
            <input type="email" id="registerEmail" placeholder="name@company.com" required>
            <span class="input-error-message" id="registerEmailError"></span>
          </div>
          
          <div class="form-group">
            <label for="registerPassword" data-i18n-key="auth.password">Mật khẩu</label>
            <div class="password-input-wrapper">
              <input type="password" id="registerPassword" placeholder="••••••••" autocomplete="new-password" required>
              <button type="button" class="password-toggle-btn" data-target="registerPassword" aria-label="Toggle password visibility">
                <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                <svg class="eye-off-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
              </button>
            </div>
            <div class="password-requirements" id="passwordRequirements">
              <div class="password-requirements-title" data-i18n-key="auth.passwordRequirements">Mật khẩu của bạn phải có:</div>
              <div class="password-requirement" id="req-length"><span class="requirement-icon">—</span><span data-i18n-key="auth.reqMinLength">Tối thiểu 8 ký tự</span></div>
              <div class="password-requirement" id="req-letter"><span class="requirement-icon">—</span><span data-i18n-key="auth.reqLetter">Chứa chữ cái (a-z, A-Z)</span></div>
              <div class="password-requirement" id="req-number"><span class="requirement-icon">—</span><span data-i18n-key="auth.reqNumber">Chứa số (0-9)</span></div>
            </div>
          </div>
          
          <div class="form-group">
            <label for="registerConfirmPassword" data-i18n-key="auth.confirmPassword">Xác nhận mật khẩu</label>
            <div class="password-input-wrapper">
              <input type="password" id="registerConfirmPassword" placeholder="••••••••" autocomplete="new-password" required>
              <button type="button" class="password-toggle-btn" data-target="registerConfirmPassword" aria-label="Toggle password visibility">
                <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                <svg class="eye-off-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
              </button>
            </div>
            <span class="input-error-message" id="confirmPasswordError"></span>
          </div>
          
          <button type="submit" class="submit-btn" data-i18n-key="auth.signUpBtn">Đăng ký</button>
        </form>
      </div>
    </div>
  </div>
</div>
