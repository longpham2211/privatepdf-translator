<script>
    // Critical Script: Anti-FOUC (Dark Mode) & Language Fix
    // Executed immediately before page rendering
    (function () {
      // 1. Handle Dark Mode Immediately
      const isDark = localStorage.getItem('darkMode') === 'enabled';
      if (isDark) {
        document.documentElement.classList.add('dark-mode');
        // Force paint background dark immediately to stop white flash
        document.write('<style>html, body { background-color: #0a0a0a !important; color: #f8f9fa !important; }</style>');
      }

      // 2. Handle Language Immediately
      const savedLang = localStorage.getItem('selectedLanguage');
      if (savedLang === 'en' || savedLang === 'vi') {
        document.documentElement.lang = savedLang;
      } else {
        const browserLang = navigator.language || navigator.userLanguage;
        document.documentElement.lang = browserLang.startsWith('vi') ? 'vi' : 'en';
      }
    })();
  </script>
